<!doctype html>
<html>
  <head>
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 p-6">
    <div class="max-w-5xl mx-auto bg-white shadow-lg rounded-lg p-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold">Leads Dashboard</h2>

        <form action="/logout" method="get">
          <button
            class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600"
          >
            Logout
          </button>
        </form>
      </div>

      <a
        href="/create-lead"
        class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600"
      >
        + Create Lead
      </a>

      <table class="w-full mt-4 border rounded-lg overflow-hidden">
        <thead class="bg-gray-200">
          <tr>
            <th class="p-2">ID</th>
            <th class="p-2">Name</th>
            <th class="p-2">Email</th>
            <th class="p-2">Owner</th>
            <th class="p-2">Status</th>
          </tr>
        </thead>

        <tbody>
          {% for lead in leads %}
          <tr class="text-center border-t hover:bg-gray-50">
            <td class="p-2">{{ lead.id }}</td>
            <td class="p-2">{{ lead.name }}</td>
            <td class="p-2">{{ lead.email }}</td>

            <td class="p-2">
              {% if lead.owner %} {{ lead.owner.email }} {% else %} No Owner {%
              endif %}
            </td>

            <td class="p-2">
              <span class="px-2 py-1 rounded bg-green-100 text-green-700">
                {{ lead.status or "new" }}
              </span>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
