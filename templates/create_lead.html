<!doctype html>
<html>
  <head>
    <title>Create Lead</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-6 rounded-lg shadow-lg w-96">
      <h2 class="text-xl font-bold mb-4">Create Lead</h2>

      <form action="/create-lead-ui" method="post">
        <input
          type="text"
          name="name"
          placeholder="Name"
          class="w-full p-2 border rounded mb-3"
          required
        />

        <input
          type="email"
          name="email"
          placeholder="Email"
          class="w-full p-2 border rounded mb-3"
          required
        />

        <select name="status" class="w-full p-2 border rounded mb-3">
          <option value="">Select Status</option>
          {% for status in statues %}
          <option value="{{ status }}">{{ status }}</option>
          {% endfor %}
        </select>

        <select name="owner_id" class="w-full p-2 border rounded mb-3" required>
          <option value="">Select Owner</option>
          {% for user in users %}
          <option value="{{ user.id }}">{{ user.email }}</option>
          {% endfor %}
        </select>

        <button
          class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600"
        >
          Create
        </button>
      </form>

      <a href="/dashboard" class="block mt-4 text-blue-500 text-center">
        Back to Dashboard
      </a>
    </div>
  </body>
</html>
